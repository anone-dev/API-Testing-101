trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - tests/mobile-testing/**

variables:
  pythonVersion: '3.9'
  nodeVersion: '18.x'

stages:
  - stage: iOSSmokeTests
    displayName: 'iOS Smoke Tests'
    jobs:
      - job: iOSSIT
        displayName: 'iOS SIT Smoke Tests'
        pool:
          vmImage: 'macOS-latest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Use Node.js $(nodeVersion)'

          - script: |
              pip install -r requirements.txt
            workingDirectory: tests/mobile-testing
            displayName: 'Install Python dependencies'

          - script: |
              npm install -g appium
              appium driver install xcuitest
            displayName: 'Install Appium and drivers'

          - script: |
              xcrun simctl boot "iPhone 14 Pro" || true
              sleep 5
            displayName: 'Boot iOS Simulator'

          - script: |
              appium &
              sleep 10
            displayName: 'Start Appium server'

          - script: |
              robot --outputdir results --include smoke tests-mobile/tagged-tests/smoke.ios.robot
            workingDirectory: tests/mobile-testing
            displayName: 'Run iOS smoke tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/output.xml'
              searchFolder: 'tests/mobile-testing/results'
              testRunTitle: 'iOS SIT Smoke Tests'
            displayName: 'Publish test results'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'tests/mobile-testing/results'
              artifactName: 'ios-sit-smoke-results'
            displayName: 'Publish test artifacts'

  - stage: iOSRegressionTests
    displayName: 'iOS Regression Tests'
    dependsOn: iOSSmokeTests
    condition: succeeded()
    jobs:
      - job: iOSSIT
        displayName: 'iOS SIT Regression Tests'
        pool:
          vmImage: 'macOS-latest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'

          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              pip install -r requirements.txt
            workingDirectory: tests/mobile-testing

          - script: |
              npm install -g appium
              appium driver install xcuitest

          - script: |
              xcrun simctl boot "iPhone 14 Pro" || true
              sleep 5

          - script: |
              appium &
              sleep 10

          - script: |
              robot --outputdir results --include regression tests-mobile/ios/
            workingDirectory: tests/mobile-testing
            displayName: 'Run iOS regression tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/output.xml'
              searchFolder: 'tests/mobile-testing/results'
              testRunTitle: 'iOS SIT Regression Tests'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'tests/mobile-testing/results'
              artifactName: 'ios-sit-regression-results'
