trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - tests/mobile-testing/**

variables:
  pythonVersion: '3.9'
  nodeVersion: '18.x'

stages:
  - stage: AndroidSmokeTests
    displayName: 'Android Smoke Tests'
    jobs:
      - job: AndroidSIT
        displayName: 'Android SIT Smoke Tests'
        pool:
          vmImage: 'macOS-latest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Use Node.js $(nodeVersion)'

          - script: |
              pip install -r requirements.txt
            workingDirectory: tests/mobile-testing
            displayName: 'Install Python dependencies'

          - script: |
              npm install -g appium
              appium driver install uiautomator2
            displayName: 'Install Appium and drivers'

          - script: |
              appium &
              sleep 10
            displayName: 'Start Appium server'

          - script: |
              robot --outputdir results --include smoke tests-mobile/tagged-tests/smoke.android.robot
            workingDirectory: tests/mobile-testing
            displayName: 'Run Android smoke tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/output.xml'
              searchFolder: 'tests/mobile-testing/results'
              testRunTitle: 'Android SIT Smoke Tests'
            displayName: 'Publish test results'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'tests/mobile-testing/results'
              artifactName: 'android-sit-smoke-results'
            displayName: 'Publish test artifacts'

  - stage: AndroidRegressionTests
    displayName: 'Android Regression Tests'
    dependsOn: AndroidSmokeTests
    condition: succeeded()
    jobs:
      - job: AndroidSIT
        displayName: 'Android SIT Regression Tests'
        pool:
          vmImage: 'macOS-latest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'

          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              pip install -r requirements.txt
            workingDirectory: tests/mobile-testing

          - script: |
              npm install -g appium
              appium driver install uiautomator2

          - script: |
              appium &
              sleep 10

          - script: |
              robot --outputdir results --include regression tests-mobile/android/
            workingDirectory: tests/mobile-testing
            displayName: 'Run Android regression tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/output.xml'
              searchFolder: 'tests/mobile-testing/results'
              testRunTitle: 'Android SIT Regression Tests'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'tests/mobile-testing/results'
              artifactName: 'android-sit-regression-results'
