trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - tests/web-testing/**

resources:
  repositories:
  - repository: templates
    type: git
    name: pipeline-templates
    ref: refs/heads/main

pool:
  name: 'qa-automation'

variables:
  - group: notification-config
  - name: workingDirectory
    value: '$(System.DefaultWorkingDirectory)/tests/web-testing'
  - name: mockServerDir
    value: '$(System.DefaultWorkingDirectory)/coe-app-demo'
  - name: mockServerPort
    value: '5000'

stages:
  - stage: Web_Testing
    displayName: 'Web Testing with Mock Server'
    jobs:
      - job: RunTests
        displayName: 'Start Mock Server & Run Web Tests'
        steps:

          - script: |
              echo "=== Disk usage before cleanup ==="
              df -h /

              echo "=== Cleaning Docker images & containers ==="
              docker system prune -af --volumes 2>/dev/null || true

              echo "=== Cleaning npm cache ==="
              npm cache clean --force 2>/dev/null || true

              echo "=== Cleaning apt cache ==="
              sudo apt-get clean 2>/dev/null || true
              sudo rm -rf /var/lib/apt/lists/* 2>/dev/null || true

              echo "=== Cleaning tmp files ==="
              sudo rm -rf /tmp/* 2>/dev/null || true

              echo "=== Disk usage after cleanup ==="
              df -h /
            displayName: 'Clean Up Disk Space'
            continueOnError: true

          - script: |
              chmod +x $(mockServerDir)/BooksAPI-Linux
              $(mockServerDir)/BooksAPI-Linux &
              echo $! > /tmp/mock_server.pid
              sleep 10
              
              # Wait for server to be ready
              for i in {1..30}; do
                if curl -f http://127.0.0.1:$(mockServerPort)/status 2>/dev/null; then
                  echo "✅ Mock server is ready"
                  exit 0
                fi
                echo "Waiting for mock server... ($i/30)"
                sleep 2
              done
              
              echo "❌ Mock server failed to start"
              cat /tmp/mock_server.pid 2>/dev/null && kill $(cat /tmp/mock_server.pid) 2>/dev/null || true
              exit 1
            displayName: 'Start Mock Server'
            env:
              HEADLESS: '1'
              LD_LIBRARY_PATH: '/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu'

          - script: |
              cd $(workingDirectory)
              npm run ui:sit:all:cliMode
            displayName: 'Run Web Tests (sit)'
            env:
              BASE_URL: 'http://127.0.0.1:$(mockServerPort)'
              ENV: 'sit'

          - script: |
              kill $(cat /tmp/mock_server.pid) 2>/dev/null || true
            displayName: 'Stop Mock Server'
            condition: always()

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(workingDirectory)/test-results/junit.xml'
              testRunTitle: 'Web Test Results'

          - template: templates/publish-test-results-artifacts.yaml@templates
            parameters:
              junitFile: '$(workingDirectory)/test-results/junit.xml'
              reportPath: '$(workingDirectory)/playwright-report'
              reportArtifactName: 'web-test-report-template'
              statusArtifactName: 'job-status-noti'
              jobName: 'RunTests'

  - template: templates/sent-notification.yaml@templates
    parameters:
      dependsOn: 'Web_Testing'
      teamWebhookUrl: $(TEAMS_WEBHOOK_URL)
      artifactName: 'job-status-noti'
